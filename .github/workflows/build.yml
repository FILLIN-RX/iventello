name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build Electron app
        run: npx --yes electron-vite build

      - name: Debug build output
        shell: pwsh
        run: |
          Write-Host "=== out/ ==="
          Get-ChildItem -LiteralPath out -Recurse | Select-Object FullName, Length | Format-Table -AutoSize
          Write-Host "=== node_modules/.bin/electron-builder ==="
          Test-Path "node_modules/.bin/electron-builder"

      - name: Package with electron-builder
        shell: pwsh
        run: |
          npx --yes electron-builder --win --publish never 2>&1 | Tee-Object -FilePath "$env:RUNNER_TEMP\ebuild.log"
          if ($LASTEXITCODE -ne 0) {
            Write-Host "=== electron-builder ERROR LOG ==="
            Get-Content "$env:RUNNER_TEMP\ebuild.log"
            exit $LASTEXITCODE
          }
        env:
          DEBUG: electron-builder

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: ${{ runner.temp }}\ebuild.log

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-windows
          path: dist/
          compression-level: 0
