name: Build and Publish Electron App

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Debug info
        shell: bash
        run: |
          echo "Node: $(node -v)"
          echo "NPM: $(npm -v)"
          echo "--- Prisma generate ---"
          npx prisma generate 2>&1
          echo "--- electron-vite version ---"
          npx electron-vite --version 2>&1 || true
          echo "--- Files in node_modules/.bin ---"
          ls -la node_modules/.bin/ | head -20

      - name: Build
        shell: bash
        run: npm run build 2>&1 || { echo "=== EJECTRON-VITE BUILD FAILED ==="; exit 1; }

      - name: Package
        shell: bash
        run: npx electron-builder --win --config electron-builder.yml

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/*Setup*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
