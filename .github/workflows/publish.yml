name: Build and Publish Electron App

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Build
        shell: bash
        run: npm run build

      - name: Package
        shell: bash
        run: |
          set -x
          node node_modules/electron-builder/cli.js --win --config electron-builder.yml 2>&1 | tee package.log
          EXIT_CODE=${PIPESTATUS[0]}
          set +x
          echo "=== EXIT CODE: $EXIT_CODE ==="
          exit $EXIT_CODE

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: package-logs
          path: package.log

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/*Setup*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
