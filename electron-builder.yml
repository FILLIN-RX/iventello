appId: com.iventello.stock-app
productName: Gestion Stock & Caisse
publish:
  provider: github
  owner: FILLIN-RX
  repo: iventello
directories:
  buildResources: build
  output: dist

files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - 'node_modules/.prisma/client/**'

asar: true
asarUnpack:
  - "**/*.node"
  - "**/*.dll"
  - "**/*.so"
  - "**/*.dylib"
  - "node_modules/@prisma/client/**"
  - "node_modules/.prisma/client/**"

extraResources:
  - from: "node_modules/@prisma/engines/"
    to: "prisma-engine/"

win:
  icon: src/assets/iventello.png
  target:
    - nsis
    - portable
