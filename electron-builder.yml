appId: com.iventello.stock-app
productName: Gestion Stock & Caisse
publish:
  provider: github
  owner: FILLIN-RX
  repo: iventello
directories:
  buildResources: build
  output: dist

files:
  - 'out/**/*'
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'

asar: true
asarUnpack:
  - "**/*.node"
  - "**/*.dll"
  - "**/*.so"
  - "**/*.dylib"

extraResources:
  - from: "node_modules/@prisma/engines/"
    to: "prisma-engine/"
    filter:
      - "query_engine-windows.dll.node"

npmRebuild: false
nodeGypRebuild: false

win:
  icon: src/assets/iventello.png
  target:
    - nsis
    - portable
